services:
  spark-connect:
    image: apache/spark:latest
    ports:
      - "15002:15002"
    command: >
      bash -c "/opt/spark/sbin/start-connect-server.sh \
      --packages io.delta:delta-connect-server_2.13:4.0.0,com.google.protobuf:protobuf-java:3.25.1 \
      --conf "spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension" \
      --conf "spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog" \
      --conf "spark.connect.extensions.relation.classes=org.apache.spark.sql.connect.delta.DeltRelationPlugin" \
      --conf "spark.connect.extensions.command.classes=org.apache.spark.sql.connect.delta.DeltaCommandPlugin" \
      --conf spark.jars.ivy=/tmp/.ivy2 \
      --conf spark.sql.warehouse.dir=/tmp/warehouse \
      && tail -f /dev/null"
    restart: unless-stopped
