name: 🚀 Feature Request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
type: bug
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement 🚀  
        Please describe the feature and its motivation.

  - type: textarea
    id: problem
    attributes:
      label: Problem or limitation
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your proposed solution.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions you've thought about?

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add any other context, screenshots, or examples here.